<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cenfo-Tech | Carrito</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/carrito.css">
</head>
<body>

  <header class="navbar">
    <div class="nav-left">
      <a href="home.html">
        <img src="icons/Cenfo-tech.png" class="logo-mini" alt="logo"/>
      </a>
      <span class="brand">CenfoTech</span>
    </div>

    <div class="nav-center">
      <nav class="nav-links">
        <a href="home.html">Inicio</a>
        <a href="index.html">About</a>
      </nav>
    </div>

    <div class="nav-right">
      <a href="carrito.html" class="nav-icon-link active">
        <i data-feather="shopping-cart"></i>
      </a>
      <a href="#" class="nav-icon-link" id="btnUsuario">
        <i data-feather="user"></i>
        <span id="usuarioNombre"></span>
      </a>
    </div>
  </header>

  <section class="hero-carrito">
    <h1>Mi Carrito</h1>
    <p>Revisa tus productos antes de comprar</p>
  </section>

  <div class="carrito-container">
    <div class="carrito-items">
      <h2>Productos</h2>
      <div id="carritoLista"></div>
    </div>
    <div class="carrito-resumen">
      <h3>Resumen</h3>
      <div id="resumenContent"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-brand">
        <img src="icons/Cenfo-tech.png" class="footer-logo" alt="logo"/>
        <p>Brindamos soluciones tecnológicas accesibles, confiables y modernas.</p>
        <div class="footer-social">
          <i data-feather="twitter"></i>
          <i data-feather="facebook"></i>
          <i data-feather="instagram"></i>
        </div>
      </div>
      <div class="footer-menu">
        <h4>Menu</h4>
        <a href="home.html">Inicio</a>
        <a href="index.html">About</a>
        <a href="carrito.html">Carrito</a>
        <a href="login.html">Mi cuenta</a>
      </div>
    </div>
  </footer>

  <script src="js/carrito.js"></script>
  <script>feather.replace();</script>

</html>
